kind = "web"
previewPath = "/"
title = "MatchHub"
version = "1.0.0"
id = "artifacts/matchhub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20529

[services.development]
run = "pnpm --filter @workspace/matchhub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/matchhub", "run", "build" ]
publicDir = "artifacts/matchhub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20529"
BASE_PATH = "/"
